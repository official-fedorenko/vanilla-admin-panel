<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авторизация — Моя Админка</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%238a2be2'/%3E%3Cstop offset='100%25' stop-color='%2300d2ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='42' fill='url(%23g)'/%3E%3Ctext x='50' y='63' font-size='46' text-anchor='middle' fill='white' font-family='system-ui,sans-serif' font-weight='700'%3EA%3C/text%3E%3C/svg%3E">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Панель Управления</h1>
        <p>Войдите для доступа к администрированию</p>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Имя пользователя</label>
          <input type="text" id="username" class="form-control" placeholder="Введите имя..." required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" class="form-control" placeholder="Введите пароль..." required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">
          <span>Войти в систему</span>
          <i data-lucide="arrow-right"></i>
        </button>
      </form>

      <form id="twoFactorForm" style="display: none;">
        <div class="form-group">
          <label for="twoFactorCode">Код из приложения-аутентификатора</label>
          <input type="text" id="twoFactorCode" class="form-control" placeholder="000000" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">
          <span>Подтвердить</span>
          <i data-lucide="shield-check"></i>
        </button>
      </form>

      <div id="loginError" style="margin-top: 15px; color: hsl(var(--accent-red)); font-size: 13px; text-align: center; display: none;">
        Неверное имя пользователя или пароль
      </div>

      <div style="text-align: center; margin-top: 24px; border-top: 1px solid hsl(var(--border-color)); padding-top: 20px;">
        <a href="/" style="color: hsl(var(--text-secondary)); text-decoration: none; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; transition: var(--transition-smooth);" onmouseover="this.style.color='hsl(var(--text-primary))'" onmouseout="this.style.color='hsl(var(--text-secondary))'">
          <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
          На главную
        </a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // Initialize icons
    lucide.createIcons();

    // Custom Toast Helper
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}"></i>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      lucide.createIcons({attrs: {'stroke-width': 2}});
      
      // Animate in
      setTimeout(() => toast.classList.add('show'), 10);
      
      // Remove after 3s
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    let pendingTwoFactorToken = null;

    // Login Form Handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const usernameInput = document.getElementById('username').value;
      const passwordInput = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');

      errorDiv.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: usernameInput,
            password: passwordInput
          })
        });

        const data = await response.json();

        if (response.ok && data.success && data.requires2FA) {
          pendingTwoFactorToken = data.pendingToken;
          document.getElementById('loginForm').style.display = 'none';
          document.getElementById('twoFactorForm').style.display = 'block';
          showToast('Введите код из приложения-аутентификатора', 'success');
        } else if (response.ok && data.success) {
          showToast('Успешный вход! Перенаправление...', 'success');
          setTimeout(() => {
            window.location.href = '/admin/';
          }, 800);
        } else {
          errorDiv.textContent = data.message || 'Неверные данные для входа';
          errorDiv.style.display = 'block';
          showToast(data.message || 'Ошибка входа', 'error');
        }
      } catch (err) {
        console.error(err);
        errorDiv.textContent = 'Ошибка сети. Попробуйте позже.';
        errorDiv.style.display = 'block';
        showToast('Ошибка сети при попытке входа', 'error');
      }
    });

    // Two-Factor Code Form Handler
    document.getElementById('twoFactorForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('twoFactorCode').value;
      const errorDiv = document.getElementById('loginError');
      errorDiv.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login-2fa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pendingToken: pendingTwoFactorToken, code })
        });
        const data = await response.json();

        if (response.ok && data.success) {
          showToast('Успешный вход! Перенаправление...', 'success');
          setTimeout(() => {
            window.location.href = '/admin/';
          }, 800);
        } else {
          errorDiv.textContent = data.message || 'Неверный код';
          errorDiv.style.display = 'block';
          showToast(data.message || 'Неверный код', 'error');
        }
      } catch (err) {
        errorDiv.textContent = 'Ошибка сети. Попробуйте позже.';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
