<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #050505;
      --bg-surface: rgba(14, 14, 20, 0.8);
      --bg-card: rgba(20, 20, 28, 0.7);
      --bg-input: rgba(255,255,255,0.04);
      --text-primary: #ffffff;
      --text-secondary: #a0a0ab;
      --text-muted: #606068;
      --accent-purple: #8a2be2;
      --accent-cyan: #00d2ff;
      --border-color: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(138, 43, 226, 0.6);
      --red: #ff4a6e;
      --green: #00e5a0;
      --glass-blur: blur(20px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(100px); pointer-events: none; z-index: 0;
    }
    .blob-1 { width: 600px; height: 600px; top: -150px; left: -150px; background: radial-gradient(circle, rgba(138,43,226,0.12) 0%, transparent 70%); }
    .blob-2 { width: 500px; height: 500px; bottom: 0; right: -100px; background: radial-gradient(circle, rgba(0,210,255,0.09) 0%, transparent 70%); }

    /* Navbar */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--bg-surface);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--border-color);
      z-index: 100;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 66px;
    }
    .nav-logo {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, #fff, #a0a0ab);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-user {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: var(--text-secondary);
    }
    .nav-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white; flex-shrink: 0;
    }
    .nav-username { font-weight: 600; color: var(--text-primary); font-size: 14px; }
    .btn-logout {
      background: rgba(255,74,110,0.1); border: 1px solid rgba(255,74,110,0.2);
      color: var(--red); padding: 8px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-logout:hover { background: rgba(255,74,110,0.2); transform: translateY(-1px); }
    .btn-home {
      color: var(--text-secondary); text-decoration: none;
      font-size: 13px; font-weight: 500; transition: color 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-home:hover { color: var(--text-primary); }

    /* Layout */
    .page {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 100px 24px 60px;
    }

    /* Page header */
    .page-hero {
      margin-bottom: 40px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .hero-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(138,43,226,0.5), rgba(0,210,255,0.4));
      border: 2px solid rgba(138,43,226,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800; color: white;
      flex-shrink: 0;
    }
    .hero-text h1 {
      font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .hero-text h1 span { 
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-meta {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .meta-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-secondary);
    }
    .meta-item svg { width: 14px; height: 14px; flex-shrink: 0; }
    .badge-role {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,210,255,0.1); border: 1px solid rgba(0,210,255,0.2);
      color: var(--accent-cyan); padding: 4px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .card-title {
      font-size: 16px; font-weight: 700;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
    }
    .card-title svg { width: 18px; height: 18px; color: var(--accent-purple); }

    /* Form */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .input-readonly {
      padding: 12px 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 12px 16px;
      font-size: 14px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }
    input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(138,43,226,0.12); }
    input::placeholder { color: rgba(160,160,171,0.4); }

    .section-divider {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 22px 0;
    }
    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 16px;
    }

    .btn-save {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent-purple), #5e17eb);
      color: white; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; margin-top: 6px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .btn-save:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(138,43,226,0.3); }
    .btn-save:active { transform: translateY(0); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Articles */
    .articles-list { display: flex; flex-direction: column; gap: 16px; }
    .article-item {
      padding: 18px 20px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      transition: border-color 0.2s, background 0.2s;
    }
    .article-item:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
    .article-date {
      font-size: 11px; font-weight: 600;
      color: var(--accent-cyan); letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .article-title {
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.3px; margin-bottom: 10px;
      color: var(--text-primary);
    }
    .article-preview {
      font-size: 13px; color: var(--text-secondary); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .article-preview p { margin: 0; }
    .no-articles {
      text-align: center; padding: 40px 20px;
      color: var(--text-muted); font-size: 14px;
    }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 20px;
    }
    .stat-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px; padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--text-secondary); }

    /* Toast */
    .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
    .toast {
      background: rgba(20,20,28,0.95); border: 1px solid var(--border-color);
      border-left: 3px solid var(--accent-purple);
      color: var(--text-primary); padding: 14px 18px; border-radius: 10px;
      font-size: 14px; transform: translateX(120%);
      transition: transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275); min-width: 260px;
    }
    .toast.success { border-left-color: var(--green); }
    .toast.error { border-left-color: var(--red); }
    .toast.show { transform: translateX(0); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo" id="navSiteName">Мой Блог</a>
      <div class="nav-right">
        <a href="/admin/" id="adminPanelLink" class="btn-home" style="display:none; color: var(--accent-cyan);">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14" style="stroke: var(--accent-cyan);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Админ-панель
        </a>
        <a href="/" class="btn-home">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          На сайт
        </a>
        <div class="nav-user">
          <div class="nav-avatar" id="navAvatar">?</div>
          <span class="nav-username" id="navUsername">...</span>
        </div>
        <button class="btn-logout" id="logoutBtn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Выйти
        </button>
      </div>
    </div>
  </nav>

  <div class="page">
    <!-- Hero -->
    <div class="page-hero">
      <div class="hero-avatar" id="heroAvatar">?</div>
      <div class="hero-text">
        <h1>Привет, <span id="heroUsername">...</span>!</h1>
        <div class="hero-meta">
          <div class="meta-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            Зарегистрирован: <strong id="regDate">...</strong>
          </div>
          <div class="meta-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <span id="heroEmail">...</span>
          </div>
          <span class="badge-role" id="heroRole">User</span>
        </div>
      </div>
    </div>

    <div class="grid">
      <!-- Профиль -->
      <div>
        <div class="card">
          <div class="card-title">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Мой профиль
          </div>


          <div class="form-group">
            <label>Имя пользователя</label>
            <div class="input-readonly" id="displayUsername">...</div>
          </div>

          <form id="profileForm">
            <div class="form-group">
              <label for="emailInput">Email</label>
              <input type="email" id="emailInput" placeholder="Ваш email..." required>
            </div>

            <hr class="section-divider">
            <div class="section-label">Смена пароля (необязательно)</div>

            <div class="form-group">
              <label for="currentPassword">Текущий пароль</label>
              <input type="password" id="currentPassword" placeholder="Введите текущий пароль...">
            </div>
            <div class="form-group">
              <label for="newPassword">Новый пароль</label>
              <input type="password" id="newPassword" placeholder="Минимум 6 символов...">
            </div>

            <button type="submit" class="btn-save" id="saveBtn">Сохранить изменения</button>
          </form>
        </div>
      </div>

      <!-- Правая колонка: статьи -->
      <div style="display: flex; flex-direction: column; gap: 28px;">

        <!-- Чат поддержки -->
        <div class="card" style="display: flex; flex-direction: column; height: 500px;">
          <div class="card-title" style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 10px;">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18" style="color: var(--accent-purple);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
              <span id="cabinetChatTitle">Чат с поддержкой</span>
            </div>
            <button id="adminBackBtn" style="display: none; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-secondary); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;">Назад</button>
          </div>
          <div id="cabinetChatMessages" style="flex: 1; overflow-y: auto; padding-right: 10px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px;">
            <div style="text-align: center; color: var(--text-muted); font-size: 13px; margin: auto;">Загрузка сообщений...</div>
          </div>
          <form id="cabinetChatForm" style="display: flex; gap: 10px;">
            <input type="text" id="cabinetChatMessageInput" placeholder="Напишите сообщение..." required style="flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); padding: 12px; border-radius: 10px; outline: none; font-family: 'Inter', sans-serif;">
            <button type="submit" class="btn-save" style="width: auto; padding: 0 20px; margin: 0;">Отправить</button>
          </form>
        </div>

        <div class="card">
          <div class="card-title">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Последние публикации
          </div>
          <div id="articlesList" class="articles-list">
            <!-- Skeleton -->
            <div class="article-item" style="opacity:0.4">
              <div class="article-date">Загрузка...</div>
              <div class="article-title">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    let currentUserData = null;

    function showToast(msg, type = 'success') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3500);
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    async function loadProfile() {
      try {
        const res = await fetch('/api/cabinet/me');
        if (!res.ok) {
          window.location.href = '/login.html';
          return;
        }
        const data = await res.json();
        currentUserData = data.user;
        populateUI(data.user);
      } catch (e) {
        window.location.href = '/login.html';
      }
    }

    function populateUI(user) {
      const letter = user.username.charAt(0).toUpperCase();
      document.getElementById('navAvatar').textContent = letter;
      document.getElementById('navUsername').textContent = user.username;
      document.getElementById('heroAvatar').textContent = letter;
      document.getElementById('heroUsername').textContent = user.username;
      document.getElementById('heroEmail').textContent = user.email;
      let roleText = 'Пользователь';
      if (user.role === 'Superadmin') roleText = 'Суперадмин';
      else if (user.role === 'Admin') roleText = 'Администратор';
      
      document.getElementById('heroRole').textContent = roleText;
      document.getElementById('displayUsername').textContent = user.username;
      document.getElementById('emailInput').value = user.email;

      if (user.role === 'Admin' || user.role === 'Superadmin') {
        document.getElementById('adminPanelLink').style.display = 'inline-flex';
      }

      const regDate = new Date(user.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('regDate').textContent = regDate;
      document.title = `Кабинет — ${user.username}`;
    }

    async function loadArticles() {
      try {
        const res = await fetch('/api/public/articles');
        const articles = await res.json();
        const list = document.getElementById('articlesList');

        if (!articles.length) {
          list.innerHTML = '<div class="no-articles">Опубликованных статей пока нет</div>';
          return;
        }

        list.innerHTML = '';
        articles.slice(0, 5).forEach(art => {
          const date = new Date(art.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
          const item = document.createElement('div');
          item.className = 'article-item';
          item.innerHTML = `
            <div class="article-date">${date}</div>
            <div class="article-title">${escapeHtml(art.title)}</div>
            <div class="article-preview">${art.content || 'Нет описания'}</div>
          `;
          list.appendChild(item);
        });
      } catch (e) {
        document.getElementById('articlesList').innerHTML = '<div class="no-articles">Не удалось загрузить статьи</div>';
      }
    }

    async function loadSettings() {
      try {
        const res = await fetch('/api/public/settings');
        const settings = await res.json();
        const map = {};
        settings.forEach(s => map[s.key] = s.value);
        if (map.site_name) {
          document.getElementById('navSiteName').textContent = map.site_name;
        }
      } catch(e) {}
    }

    // Profile form submission
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      const email = document.getElementById('emailInput').value.trim();
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;

      if (!email) { showToast('Введите email', 'error'); return; }
      if (newPassword && newPassword.length < 6) {
        showToast('Новый пароль слишком короткий (минимум 6 символов)', 'error'); return;
      }
      if (newPassword && !currentPassword) {
        showToast('Для смены пароля введите текущий пароль', 'error'); return;
      }

      btn.disabled = true;
      btn.textContent = 'Сохраняем...';

      const payload = { email };
      if (newPassword) { payload.password = newPassword; payload.currentPassword = currentPassword; }

      try {
        const res = await fetch('/api/cabinet/profile', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (res.ok && data.success) {
          showToast(data.message || 'Профиль успешно обновлён', 'success');
          document.getElementById('heroEmail').textContent = email;
          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value = '';
        } else {
          showToast(data.message || 'Ошибка при сохранении', 'error');
        }
      } catch (err) {
        showToast('Ошибка сети', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Сохранить изменения';
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
        window.location.href = '/login.html';
      } catch (e) {
        window.location.href = '/login.html';
      }
    });

    // Chat logic
    let chatPolling = null;
    let activeAdminTicketId = null;
    
    async function loadChatMessages(isPolling = false) {
      if (currentUserData.role === 'Admin' || currentUserData.role === 'Superadmin') {
        if (activeAdminTicketId) {
          await loadActiveTicketMessages(isPolling);
        } else {
          await loadAdminTickets();
        }
        return;
      }

      // Regular user logic
      try {
        const res = await fetch('/api/support/messages');
        if (res.ok) {
          const data = await res.json();
          renderChatMessages(data.messages, isPolling);
          if (!isPolling) {
            await fetch('/api/support/read', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ticketId: 'user_' + currentUserData.id}) });
          }
        }
      } catch(e) {}
    }

    function renderChatMessages(messages, isPolling) {
      const container = document.getElementById('cabinetChatMessages');
      const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 10;
      
      if (!messages || !messages.length) {
        container.innerHTML = '<div style="text-align:center; color: var(--text-muted); font-size: 13px; margin: auto;">У вас пока нет сообщений.<br>Напишите нам, если есть вопросы!</div>';
        return;
      }
      
      let html = '';
      messages.forEach(msg => {
        const isMe = msg.user_id === currentUserData.id || msg.sender_role === 'User' || msg.sender_role === 'Guest' || msg.sender_role === currentUserData.role;
        const isAdminMsg = msg.sender_role === 'Admin' || msg.sender_role === 'Superadmin';
        const alignRight = (currentUserData.role === 'Admin' || currentUserData.role === 'Superadmin') ? isAdminMsg : !isAdminMsg;
        
        const align = alignRight ? 'flex-end' : 'flex-start';
        const bg = alignRight ? 'linear-gradient(135deg, var(--accent-purple), var(--accent-cyan))' : 'rgba(255,255,255,0.05)';
        const color = alignRight ? '#fff' : 'inherit';
        const name = alignRight ? 'Вы' : (msg.name || 'Поддержка');
        const time = new Date(msg.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        
        html += `
          <div style="display: flex; flex-direction: column; align-items: ${align};">
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 4px;">${escapeHtml(name)} • ${time}</div>
            <div style="background: ${bg}; color: ${color}; padding: 10px 14px; border-radius: 14px; max-width: 85%; font-size: 13px; word-break: break-word;">
              ${escapeHtml(msg.message)}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
      if (!isPolling || wasAtBottom) {
        container.scrollTop = container.scrollHeight;
      }
    }

    document.getElementById('cabinetChatForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('cabinetChatMessageInput');
      const message = input.value.trim();
      if (!message) return;
      
      input.disabled = true;
      try {
        if (currentUserData.role === 'Admin' || currentUserData.role === 'Superadmin') {
          if (!activeAdminTicketId) return;
          const res = await fetch('/api/support/reply', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticketId: activeAdminTicketId, message })
          });
          if (res.ok) {
            input.value = '';
            await loadActiveTicketMessages(false);
          }
        } else {
          const res = await fetch('/api/support/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
          });
          if (res.ok) {
            input.value = '';
            await loadChatMessages();
          }
        }
      } catch(e) {
        showToast('Ошибка при отправке', 'error');
      } finally {
        input.disabled = false;
        input.focus();
      }
    });

    // Admin support ticket management logic
    async function loadAdminTickets() {
      if (activeAdminTicketId) return;
      try {
        const res = await fetch('/api/support/tickets');
        if (res.ok) {
          const data = await res.json();
          renderAdminTickets(data.tickets);
        }
      } catch(e) {}
    }

    function renderAdminTickets(tickets) {
      if (activeAdminTicketId) return;
      const container = document.getElementById('cabinetChatMessages');
      if (!container) return;
      
      // Hide input form and back button, reset title
      document.getElementById('cabinetChatForm').style.display = 'none';
      document.getElementById('adminBackBtn').style.display = 'none';
      document.getElementById('cabinetChatTitle').textContent = 'Обращения пользователей';
      
      if (!tickets || !tickets.length) {
        container.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 13px; margin: auto;">Нет активных обращений от пользователей.</div>';
        return;
      }
      
      let html = '<div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">';
      tickets.forEach(t => {
        const unreadBadge = t.unread_count > 0 ? `<span style="background: var(--red); color: white; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: bold; margin-left: auto;">${t.unread_count}</span>` : '';
        const nameLetter = (t.name || 'U').charAt(0).toUpperCase();
        
        html += `
          <div class="ticket-item" onclick="openAdminChatInline('${t.ticket_id}', '${escapeHtml(t.name || 'Пользователь')}', '${escapeHtml(t.email || '')}')" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 12px; cursor: pointer; transition: background 0.2s; background: rgba(255,255,255,0.01);" onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background='rgba(255,255,255,0.01)'">
            <div style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white;">${nameLetter}</div>
            <div style="flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 2px;">
              <span style="font-weight: 600; font-size: 14px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; color: #fff;">${escapeHtml(t.name || 'Пользователь')}</span>
              <span style="font-size: 11px; color: var(--text-secondary); text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">${escapeHtml(t.email || '')}</span>
            </div>
            ${unreadBadge}
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    window.openAdminChatInline = async function(ticketId, name, email) {
      activeAdminTicketId = ticketId;
      document.getElementById('cabinetChatTitle').textContent = `Чат: ${name}`;
      document.getElementById('adminBackBtn').style.display = 'inline-block';
      document.getElementById('cabinetChatForm').style.display = 'flex';
      
      // Load messages
      await loadActiveTicketMessages(false);
      
      // Mark as read
      await fetch('/api/support/read', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticketId })
      });
    };

    window.closeAdminChatInline = function() {
      activeAdminTicketId = null;
      loadAdminTickets();
    };

    async function loadActiveTicketMessages(isPolling = false) {
      if (!activeAdminTicketId) return;
      try {
        const res = await fetch(`/api/support/messages?ticketId=${activeAdminTicketId}`);
        if (res.ok) {
          const data = await res.json();
          renderChatMessages(data.messages, isPolling);
        }
      } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
      const backBtn = document.getElementById('adminBackBtn');
      if (backBtn) {
        backBtn.addEventListener('click', window.closeAdminChatInline);
      }

      // Init
      (async () => {
        await Promise.all([loadProfile(), loadArticles(), loadSettings()]);
        if (currentUserData) {
          if (currentUserData.role === 'Admin' || currentUserData.role === 'Superadmin') {
            await loadAdminTickets();
            chatPolling = setInterval(loadAdminTickets, 5000);
          } else {
            await loadChatMessages();
            chatPolling = setInterval(() => loadChatMessages(true), 5000);
          }
        }
      })();
    });
  </script>
</body>
</html>
