<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Мой Блог</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #050505;
      --bg-card: rgba(20, 20, 28, 0.85);
      --text-primary: #ffffff;
      --text-secondary: #a0a0ab;
      --accent-purple: #8a2be2;
      --accent-cyan: #00d2ff;
      --border-color: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(138, 43, 226, 0.6);
      --glass-blur: blur(20px);
      --red: #ff4a6e;
      --green: #00e5a0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; top: -100px; left: -150px; background: radial-gradient(circle, rgba(138,43,226,0.18) 0%, transparent 70%); }
    .blob-2 { width: 400px; height: 400px; bottom: -80px; right: -100px; background: radial-gradient(circle, rgba(0,210,255,0.14) 0%, transparent 70%); }

    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text-primary); }
    .back-link svg { width: 16px; height: 16px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(138,43,226,0.3), rgba(0,210,255,0.2));
      border: 1px solid rgba(138,43,226,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .card-icon svg { width: 26px; height: 26px; color: var(--accent-cyan); }
    h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 13px 16px;
      font-size: 15px;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }
    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(138,43,226,0.12);
    }
    input::placeholder { color: rgba(160,160,171,0.5); }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-purple), #5e17eb);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(138,43,226,0.35); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-loader { display: none; }
    .btn.loading .btn-text { display: none; }
    .btn.loading .btn-loader { display: inline-block; }

    .error-box {
      background: rgba(255,74,110,0.1);
      border: 1px solid rgba(255,74,110,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--red);
      margin-top: 16px;
      display: none;
    }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .footer-link a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-link a:hover { text-decoration: underline; }

    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 2000;
    }
    .toast {
      background: rgba(20,20,28,0.95);
      border: 1px solid var(--border-color);
      border-left: 3px solid var(--accent-purple);
      color: var(--text-primary);
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      transform: translateX(120%);
      transition: transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
      min-width: 260px;
    }
    .toast.success { border-left-color: var(--green); }
    .toast.error { border-left-color: var(--red); }
    .toast.show { transform: translateX(0); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="auth-wrapper">
    <a href="/" class="back-link">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      На главную
    </a>

    <div class="card">
      <div class="card-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </div>

      <h1>С возвращением!</h1>
      <p class="subtitle">Войдите в свою учётную запись</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Имя пользователя</label>
          <input type="text" id="username" placeholder="Введите логин..." required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" placeholder="Введите пароль..." required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="submitBtn">
          <span class="btn-text">Войти</span>
          <span class="btn-loader">Входим...</span>
        </button>
        <div class="error-box" id="errorBox"></div>
      </form>

      <div class="footer-link">
        Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // Проверяем, вдруг уже авторизованы
    async function checkExistingSession() {
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) {
          const data = await res.json();
          redirectByRole(data.user.role);
        }
      } catch(e) { /* не авторизован, показываем форму */ }
    }

    function redirectByRole(role) {
      window.location.href = '/cabinet.html';
    }

    function showToast(msg, type = 'success') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3500);
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorBox = document.getElementById('errorBox');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.classList.add('loading');
      errorBox.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          showToast('Добро пожаловать, ' + data.user.username + '!', 'success');
          setTimeout(() => redirectByRole(data.user.role), 700);
        } else {
          errorBox.textContent = data.message || 'Неверные данные для входа';
          errorBox.style.display = 'block';
          btn.disabled = false;
          btn.classList.remove('loading');
        }
      } catch(err) {
        errorBox.textContent = 'Ошибка сети. Попробуйте позже.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    });

    checkExistingSession();
  </script>
</body>
</html>
